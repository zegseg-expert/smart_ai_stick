<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Walking Stick – Caregiver Dashboard</title>
    <!-- Leaflet CSS for map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat .label {
            font-size: 14px;
            color: #5f6368;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat .value {
            font-size: 32px;
            font-weight: bold;
            color: #202124;
            margin-top: 8px;
        }
        .stat .unit {
            font-size: 14px;
            color: #5f6368;
        }
        .alert {
            background: #fce8e6;
            border-left: 5px solid #d93025;
        }
        .alert .value {
            color: #d93025;
        }
        #map {
            height: 400px;
            border-radius: 12px;
            margin-top: 10px;
            z-index: 1;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #5f6368;
            font-size: 12px;
        }
        .last-update {
            text-align: right;
            font-size: 12px;
            color: #5f6368;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🦯 Smart Walking Stick · Live Caregiver Dashboard</h1>

    <div class="stats-grid">
        <div class="stat" id="batteryCard">
            <div class="label">🔋 Battery</div>
            <div class="value" id="batteryValue">--</div>
            <div class="unit">%</div>
        </div>
        <div class="stat" id="frontCard">
            <div class="label">⚠️ Front Obstacle</div>
            <div class="value" id="frontValue">--</div>
            <div class="unit">cm</div>
        </div>
        <div class="stat" id="downCard">
            <div class="label">🕳️ Down Sensor (Hole)</div>
            <div class="value" id="downValue">--</div>
            <div class="unit">cm</div>
        </div>
        <div class="stat" id="fallCard">
            <div class="label">🚨 Fall Status</div>
            <div class="value" id="fallValue">--</div>
        </div>
    </div>

    <div class="status-card">
        <div class="label">🗺️ Live Location</div>
        <div id="map"></div>
        <div class="last-update" id="lastUpdate">Waiting for data...</div>
    </div>
    <div class="footer">
        Data refreshes automatically from Firebase Realtime Database.
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ========== YOUR FIREBASE CONFIGURATION ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAyt08_8kWXflYPVls7rzgjYVfuubpuHCM",
        authDomain: "smart-walking-stick-f8b20.firebaseapp.com",
        databaseURL: "https://smart-walking-stick-f8b20-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-walking-stick-f8b20",
        storageBucket: "smart-walking-stick-f8b20.firebasestorage.app",
        messagingSenderId: "267961230635",
        appId: "1:267961230635:web:a11cbd19428a5435e7916e"
    };
    // =================================================

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let map;
    let marker;
    const defaultLat = 9.5340;
    const defaultLng = 6.4496;   // Abuja, Nigeria (example)

    document.addEventListener('DOMContentLoaded', () => {
        // Initialize map
        map = L.map('map').setView([defaultLat, defaultLng], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        marker = L.marker([defaultLat, defaultLng]).addTo(map);
        marker.bindPopup("Waiting for GPS fix...").openPopup();

        const deviceRef = database.ref('/smartstick/device_001');

        // ---- Location updates ----
        deviceRef.child('location').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.latitude && data.longitude) {
                const lat = data.latitude;
                const lng = data.longitude;
                marker.setLatLng([lat, lng]);
                marker.bindPopup(`📍 Current location<br>Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}`).openPopup();
                map.setView([lat, lng], 15);
                if (data.timestamp) {
                    const date = new Date(data.timestamp * 1000);
                    document.getElementById('lastUpdate').innerHTML = `Last update: ${date.toLocaleTimeString()}`;
                } else {
                    document.getElementById('lastUpdate').innerHTML = `Last update: Just now`;
                }
            } else {
                document.getElementById('lastUpdate').innerHTML = '⏳ Waiting for GPS data...';
            }
        });

        // ---- Front distance (obstacle) ----
        deviceRef.child('sensors/front_distance').on('value', (snapshot) => {
            const dist = snapshot.val();
            if (dist !== null && dist !== undefined) {
                let display = (dist === 999) ? 'No obstacle' : `${dist} cm`;
                document.getElementById('frontValue').innerHTML = display;
                const frontCard = document.getElementById('frontCard');
                if (dist < 80 && dist > 0) frontCard.classList.add('alert');
                else frontCard.classList.remove('alert');
            } else {
                document.getElementById('frontValue').innerHTML = '--';
            }
        });

        // ---- Down distance (hole detection) ----
        deviceRef.child('sensors/down_distance').on('value', (snapshot) => {
            const dist = snapshot.val();
            if (dist !== null && dist !== undefined) {
                let display = (dist === 999) ? 'No data' : `${dist} cm`;
                document.getElementById('downValue').innerHTML = display;
                const downCard = document.getElementById('downCard');
                if (dist > 20 && dist < 999) downCard.classList.add('alert');
                else downCard.classList.remove('alert');
            } else {
                document.getElementById('downValue').innerHTML = '--';
            }
        });

        // ---- Fall detection ----
        deviceRef.child('status/fall_detected').on('value', (snapshot) => {
            const fall = snapshot.val();
            if (fall !== null && fall !== undefined) {
                document.getElementById('fallValue').innerHTML = fall ? '⚠️ FALL DETECTED' : '✅ Normal';
                const fallCard = document.getElementById('fallCard');
                if (fall) fallCard.classList.add('alert');
                else fallCard.classList.remove('alert');
            } else {
                document.getElementById('fallValue').innerHTML = '--';
            }
        });

        // ---- Battery level ----
        deviceRef.child('status/battery').on('value', (snapshot) => {
            const battery = snapshot.val();
            if (battery !== null && battery !== undefined) {
                document.getElementById('batteryValue').innerHTML = battery;
                const batteryCard = document.getElementById('batteryCard');
                if (battery < 20) batteryCard.classList.add('alert');
                else batteryCard.classList.remove('alert');
            } else {
                document.getElementById('batteryValue').innerHTML = '--';
            }
        });

        // Optional: if no data received after 10 seconds, show waiting message
        setTimeout(() => {
            if (document.getElementById('frontValue').innerHTML === '--') {
                document.getElementById('lastUpdate').innerHTML = '⏳ Waiting for ESP32 to send data...';
            }
        }, 5000);
    });
</script>
</body>
</html>
